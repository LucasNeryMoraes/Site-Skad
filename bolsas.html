<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKAD | Bolsas</title>

  <style>
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      background: #eae6df;
      color: #1c1c1c;
    }

    .top-strip {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 80px;
      background: #fff;
    }

    .logo img {
      width: 80px;
    }

    .site-search {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .site-search input {
      padding: 8px 12px;
      width: 260px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .search-button {
      background: none;
      border: none;
      cursor: pointer;
    }

    .main-nav ul {
      display: flex;
      gap: 25px;
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .main-nav a {
      text-decoration: none;
      color: #1c1c1c;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* 🔥 AQUI ESTAVA O ERRO */
    .header-actions a {
      position: relative;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-actions svg {
      width: 20px;
      height: 20px;
      stroke: #1c1c1c;
      stroke-width: 1.5;
      fill: none;
    }

    /* 🔥 BOLINHA PERFEITA AGORA */
    .cart-count {
      position: absolute;
      top: -8px;   /* mais pra cima */
      right: -4px; /* leve ajuste lateral */
      width: 16px;
      height: 16px;
      background: #111;
      color: #fff;
      font-size: 9px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .page-hero {
      padding: 50px 80px 10px;
    }

    .page-hero h1 {
      font-size: 56px;
      font-weight: 400;
      margin: 0;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 40px;
      padding: 30px 80px 60px;
    }

    .product-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .image-box {
      width: 100%;
      height: 260px;
      border-radius: 10px;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s;
    }

    .product-card:hover img {
      transform: scale(1.05);
    }

    .product-name {
      margin-top: 12px;
      font-size: 16px;
    }

    .product-price {
      margin-top: 6px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="top-strip">
    <p>FRETE GRÁTIS ACIMA DE R$ 299 | 10% OFF NA PRIMEIRA COMPRA</p>
  </div>

  <div class="header-main">

    <a class="logo" href="./index.html">
      <img src="./src/assets/skad-logo.svg">
    </a>

    <form class="site-search">
      <input type="search" placeholder="O que você procura?" />
      <button class="search-button" type="submit">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <path d="m16 16 4 4" />
        </svg>
      </button>
    </form>

    <nav class="main-nav">
      <ul>
        <li><a href="./bolsas.html">BOLSAS</a></li>
        <li><a href="#">NECESSAIRES</a></li>
        <li><a href="#">CARTEIRAS</a></li>
        <li><a href="#">ECO BAGS</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <a href="./login.html">
        <svg viewBox="0 0 24 24">
          <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
          <path d="M5 20a7 7 0 0 1 14 0" />
        </svg>
      </a>

      <a href="./carrinho.html">
        <svg viewBox="0 0 24 24">
          <path d="M6 8h12l-1 12H7L6 8Z" />
          <path d="M9 8V7a3 3 0 0 1 6 0v1" />
        </svg>
        <span class="cart-count">0</span>
      </a>
    </div>

  </div>
</header>

<main>

<section class="page-hero">
  <h1>Bolsas</h1>
</section>

<section class="product-grid">
  <!-- seus produtos continuam iguais -->
</section>

</main>

</body>
</html>
